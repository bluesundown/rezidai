version: '3.8'

# Load environment variables from .env file
env_file:
  - ./.env

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: production
    container_name: realtyai-backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - ../uploads:/app/uploads
      - ../backend/venv:/app/venv
    environment:
      - CONFIG_PATH=/app/config.yaml
      - ENVIRONMENT=development
      - MOCK_SERVICES_ENABLED=true
      - LOG_LEVEL=DEBUG
      - DATABASE_TYPE=sqlite
      - JWT_SECRET=${JWT_SECRET:-devsecret123456789}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000
    command: >
      sh -c "
      pip install -q psycopg2-binary &&
      alembic upgrade head &&
      python -m database.seed &&
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - realtyai-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: nginx:alpine
    container_name: realtyai-frontend
    ports:
      - "3000:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx-dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - realtyai-network
    restart: unless-stopped

networks:
  realtyai-network:
    driver: bridge
