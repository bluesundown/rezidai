web:
  type: web
  name: realtyai-backend
  env: python
  buildCommand: pip install -r backend/requirements.txt
  startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
  envVars:
    - key: PORT
      value: 10000
    - key: ENVIRONMENT
      value: production
    - key: MOCK_SERVICES_ENABLED
      value: false
    - key: LOG_LEVEL
      value: INFO
    - key: DATABASE_URL
      fromDatabase:
        name: realtyai-db
        property: connectionString
    - key: JWT_SECRET
      generateValue: true
    - key: QWEN_API_KEY
      sync: false
    - key: GOOGLE_MAPS_API_KEY
      sync: false
    - key: STRIPE_SECRET_KEY
      sync: false
    - key: STRIPE_WEBHOOK_SECRET
      sync: false
    - key: GOOGLE_OAUTH_CLIENT_ID
      sync: false
    - key: GOOGLE_OAUTH_CLIENT_SECRET
      sync: false
    - key: CORS_ALLOWED_ORIGINS
      value: "https://your-frontend-url.onrender.com,http://localhost:3000"

services:
  - name: realtyai-db
    database:
      name: realtyai
      plan: free
